<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>

    <link rel="stylesheet" href="components/header.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabaseClient.js"></script>
    <script src="login.js" defer></script>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: #f5f5f7;
        }

        .wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 320px;
            background: white;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
        }

        .field {
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #007aff;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #007aff;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #006ae6;
        }

        .error {
            color: #ff3b30;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* 🔥 FLOATING LABEL */
.field.floating {
    position: relative;
}

/* INPUT */
.field.floating input {
    width: 100%;
    padding: 16px 12px 8px;

    border-radius: 10px;
    border: 1px solid #ddd;

    font-size: 14px;
    background: white;

    box-sizing: border-box;
}

/* LABEL */
.field.floating label {
    position: absolute;
    left: 12px;
    top: 50%;

    transform: translateY(-50%);
    color: #888;
    font-size: 14px;

    background: white;
    padding: 0 4px;

    transition: 0.2s ease;
    pointer-events: none;
}

/* 🔥 ANIMACJA */
.field.floating input:focus + label,
.field.floating input:valid + label {
    top: 6px;
    font-size: 11px;
    color: #007aff;
}

/* 🔥 FOCUS */
.field.floating input:focus {
    outline: none;
    border-color: #007aff;
    box-shadow: 0 0 0 2px rgba(0,122,255,0.15);
}
    </style>
</head>

<body>

    <div class="wrapper">
        <div class="card">
            <h2>Logowanie</h2>

            <div class="field floating">
                <input id="login" required>
                <label for="login">Numer pracownika</label>
            </div>

            <div class="field floating">
                <input id="password" type="password" required>
                <label for="password">Hasło</label>
            </div>

            <button id="loginBtn" onclick="login()">Zaloguj</button>

            <div id="error" class="error"></div>
        </div>
    </div>

</body>

</html>
